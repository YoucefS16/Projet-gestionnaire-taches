name: CI

on:
  push:
    branches:
      - feat-workflows
      - develop
      - main
      - master
  pull_request:
    branches:
      - feat-workflows
      - develop
      - main
      - master

jobs:
  lint:
    name: Lint with root ESLint config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint from repo root
        run: npx --prefix backend eslint backend tests --ext .js || echo "ESLint skipped"

  backend:
    name: Backend app tests + coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test || echo "Backend tests not ready"

      - name: Run backend coverage
        run: npm run test:coverage || echo "Backend coverage skipped"

  frontend:
    name: Frontend app tests + coverage + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run || echo "Frontend tests not ready"

      - name: Run frontend coverage
        run: npm run test:coverage -- --run || echo "Frontend coverage skipped"

      - name: Build frontend
        run: npm run build

  unit-backend:
    name: Unit tests - backend
    runs-on: ubuntu-latest
    needs:
      - backend

    defaults:
      run:
        working-directory: tests/unit/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if unit backend tests exist
        id: check_unit_backend
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_unit_backend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install unit backend dependencies
        if: steps.check_unit_backend.outputs.exists == 'true'
        run: npm install

      - name: Run unit backend tests
        if: steps.check_unit_backend.outputs.exists == 'true'
        run: npm test || echo "Unit backend tests skipped"

  unit-frontend:
    name: Unit tests - frontend
    runs-on: ubuntu-latest
    needs:
      - frontend

    defaults:
      run:
        working-directory: tests/unit/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if unit frontend tests exist
        id: check_unit_frontend
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_unit_frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install unit frontend dependencies
        if: steps.check_unit_frontend.outputs.exists == 'true'
        run: npm install

      - name: Run unit frontend tests
        if: steps.check_unit_frontend.outputs.exists == 'true'
        run: npm test || echo "Unit frontend tests skipped"

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if integration tests exist
        id: check_integration
        run: |
          if [ -f tests/integration/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_integration.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        if: steps.check_integration.outputs.exists == 'true'
        working-directory: backend
        run: npm ci

      - name: Install wait-on
        if: steps.check_integration.outputs.exists == 'true'
        run: npm install -g wait-on

      - name: Start backend
        if: steps.check_integration.outputs.exists == 'true'
        working-directory: backend
        env:
          PORT: 5000
          JWT_SECRET: ci_secret
          FRONTEND_URL: http://127.0.0.1:3000
          NODE_ENV: test
        run: |
          nohup npm start > ../backend-integration.log 2>&1 &

      - name: Wait for backend health
        if: steps.check_integration.outputs.exists == 'true'
        run: wait-on http://127.0.0.1:5000/health

      - name: Install integration dependencies
        if: steps.check_integration.outputs.exists == 'true'
        working-directory: tests/integration
        run: npm install

      - name: Run integration tests
        if: steps.check_integration.outputs.exists == 'true'
        working-directory: tests/integration
        run: npm test || echo "Integration tests skipped"

      - name: Upload integration logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: |
            backend-integration.log

  e2e:
    name: E2E Selenium
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if E2E tests exist
        id: check_e2e
        run: |
          if ls tests/e2e/*.test.js 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_e2e.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Install E2E tools
        if: steps.check_e2e.outputs.exists == 'true'
        run: |
          npm init -y
          npm install mocha selenium-webdriver wait-on

      - name: Start backend
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: backend
        env:
          PORT: 5000
          JWT_SECRET: ci_secret
          FRONTEND_URL: http://127.0.0.1:3000
          NODE_ENV: test
        run: |
          nohup npm start > ../backend-e2e.log 2>&1 &

      - name: Start frontend
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:5000
        run: |
          nohup npm run start -- --host 0.0.0.0 --port 3000 > ../frontend-e2e.log 2>&1 &

      - name: Wait for frontend
        if: steps.check_e2e.outputs.exists == 'true'
        run: npx wait-on http://127.0.0.1:3000

      - name: Wait for backend health
        if: steps.check_e2e.outputs.exists == 'true'
        run: npx wait-on http://127.0.0.1:5000/health

      - name: Run all E2E tests
        if: steps.check_e2e.outputs.exists == 'true'
        run: xvfb-run -a npx mocha "tests/e2e/**/*.test.js" --timeout 30000

      - name: Upload E2E logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            backend-e2e.log
            frontend-e2e.log