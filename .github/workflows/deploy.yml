name: Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  verify-backend:
    name: Verify backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint || echo "Lint skipped"

      - name: Run backend tests
        run: npm test || echo "Backend tests skipped"

  verify-frontend:
    name: Verify frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run || echo "Frontend tests skipped"

      - name: Build frontend
        run: npm run build

  verify-e2e:
    name: Verify E2E Selenium
    runs-on: ubuntu-latest
    needs:
      - verify-backend
      - verify-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if E2E tests exist
        id: check_e2e
        run: |
          if ls tests/e2e/*.test.js 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_e2e.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Chrome
        if: steps.check_e2e.outputs.exists == 'true'
        uses: browser-actions/setup-chrome@v1

      - name: Install backend dependencies
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Install E2E tools
        if: steps.check_e2e.outputs.exists == 'true'
        run: |
          npm init -y
          npm install mocha selenium-webdriver chromedriver wait-on

      - name: Start backend
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: backend
        env:
          PORT: 5000
          JWT_SECRET: ci_secret
          FRONTEND_URL: http://127.0.0.1:3000
          NODE_ENV: test
        run: |
          nohup npm start > ../backend.log 2>&1 &

      - name: Start frontend
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:5000
        run: |
          nohup npm run start -- --host 0.0.0.0 --port 3000 > ../frontend.log 2>&1 &

      - name: Wait for frontend
        if: steps.check_e2e.outputs.exists == 'true'
        run: npx wait-on http://127.0.0.1:3000

      - name: Wait for backend health
        if: steps.check_e2e.outputs.exists == 'true'
        run: npx wait-on http://127.0.0.1:5000/health

      - name: Run E2E tests
        if: steps.check_e2e.outputs.exists == 'true'
        run: xvfb-run -a npx mocha "tests/e2e/**/*.test.js" --timeout 30000

      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-e2e-logs
          path: |
            backend.log
            frontend.log

  deploy-backend-render:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    needs:
      - verify-backend
      - verify-frontend
      - verify-e2e
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}

    steps:
      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-frontend-vercel:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    needs:
      - verify-backend
      - verify-frontend
      - verify-e2e
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build production artifacts
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}