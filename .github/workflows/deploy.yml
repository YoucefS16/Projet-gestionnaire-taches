name: Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  verify-lint:
    name: Verify lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint from repo root
        run: npx --prefix backend eslint backend tests --ext .js || echo "ESLint skipped"

  verify-backend:
    name: Verify backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test || echo "Backend tests skipped"

  verify-frontend:
    name: Verify frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run || echo "Frontend tests skipped"

      - name: Build frontend
        run: npm run build

  verify-unit-backend:
    name: Verify unit backend
    runs-on: ubuntu-latest
    needs:
      - verify-backend

    defaults:
      run:
        working-directory: tests/unit/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if unit backend tests exist
        id: check_unit_backend
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_unit_backend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install unit backend dependencies
        if: steps.check_unit_backend.outputs.exists == 'true'
        run: npm install

      - name: Run unit backend tests
        if: steps.check_unit_backend.outputs.exists == 'true'
        run: npm test || echo "Unit backend tests skipped"

  verify-unit-frontend:
    name: Verify unit frontend
    runs-on: ubuntu-latest
    needs:
      - verify-frontend

    defaults:
      run:
        working-directory: tests/unit/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if unit frontend tests exist
        id: check_unit_frontend
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
        fi

      - name: Setup Node
        if: steps.check_unit_frontend.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install unit frontend dependencies
        if: steps.check_unit_frontend.outputs.exists == 'true'
        run: npm install

      - name: Run unit frontend tests
        if: steps.check_unit_frontend.outputs.exists == 'true'
        run: npm test || echo "Unit frontend tests skipped"

  verify-integration:
    name: Verify integration
    runs-on: ubuntu-latest
    needs:
      - verify-backend
      - verify-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if integration tests exist
        id: check_integration
        run: |
          if [ -f tests/integration/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_integration.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        if: steps.check_integration.outputs.exists == 'true'
        working-directory: backend
        run: npm ci

      - name: Install wait-on
        if: steps.check_integration.outputs.exists == 'true'
        run: npm install -g wait-on

      - name: Start backend
        if: steps.check_integration.outputs.exists == 'true'
        working-directory: backend
        env:
          PORT: 5000
          JWT_SECRET: ci_secret
          FRONTEND_URL: http://127.0.0.1:3000
          NODE_ENV: test
        run: |
          nohup npm start > ../backend-integration.log 2>&1 &

      - name: Wait for backend health
        if: steps.check_integration.outputs.exists == 'true'
        run: wait-on http://127.0.0.1:5000/health

      - name: Install integration dependencies
        if: steps.check_integration.outputs.exists == 'true'
        working-directory: tests/integration
        run: npm install

      - name: Run integration tests
        if: steps.check_integration.outputs.exists == 'true'
        working-directory: tests/integration
        run: npm test || echo "Integration tests skipped"

  verify-e2e:
    name: Verify E2E
    runs-on: ubuntu-latest
    needs:
      - verify-backend
      - verify-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if E2E tests exist
        id: check_e2e
        run: |
          if ls tests/e2e/*.test.js 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        if: steps.check_e2e.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Install E2E tools
        if: steps.check_e2e.outputs.exists == 'true'
        run: |
          npm init -y
          npm install mocha selenium-webdriver wait-on

      - name: Start backend
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: backend
        env:
          PORT: 5000
          JWT_SECRET: ci_secret
          FRONTEND_URL: http://127.0.0.1:3000
          NODE_ENV: test
        run: |
          nohup npm start > ../backend-e2e.log 2>&1 &

      - name: Start frontend
        if: steps.check_e2e.outputs.exists == 'true'
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:5000
        run: |
          nohup npm run start -- --host 0.0.0.0 --port 3000 > ../frontend-e2e.log 2>&1 &

      - name: Wait for frontend
        if: steps.check_e2e.outputs.exists == 'true'
        run: npx wait-on http://127.0.0.1:3000

      - name: Wait for backend health
        if: steps.check_e2e.outputs.exists == 'true'
        run: npx wait-on http://127.0.0.1:5000/health

      - name: Run E2E tests
        if: steps.check_e2e.outputs.exists == 'true'
        run: xvfb-run -a npx mocha "tests/e2e/**/*.test.js" --timeout 30000

  deploy-backend-render:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    needs:
      - verify-lint
      - verify-backend
      - verify-frontend
      - verify-unit-backend
      - verify-unit-frontend
      - verify-integration
      - verify-e2e

    steps:
      - name: Trigger Render deploy if secret exists
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set, skipping backend deploy"
          fi

  deploy-frontend-vercel:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    needs:
      - verify-lint
      - verify-backend
      - verify-frontend
      - verify-unit-backend
      - verify-unit-frontend
      - verify-integration
      - verify-e2e

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel if secrets exist
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
            vercel build --prod --token="$VERCEL_TOKEN"
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          else
            echo "Vercel secrets missing, skipping frontend deploy"
          fi